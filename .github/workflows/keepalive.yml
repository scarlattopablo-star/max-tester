# Mantiene a Max DESPIERTO en Render (plan free se duerme a los ~15 min sin
# actividad). Pinguea /api/estado cada 5 minutos para que el socket de WhatsApp
# siga vivo y NO se pierdan mensajes que llegan en horas de poco movimiento.
# (El filtro de 5 min de whatsapp.js descarta mensajes viejos cuando Max
# reconecta tras dormirse; manteniéndolo despierto el problema no ocurre.)
name: keep-max-awake

on:
  schedule:
    - cron: "*/5 * * * *" # cada 5 minutos (mínimo que permite GitHub Actions)
  workflow_dispatch: {} # permite dispararlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar a Max
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
              "https://max-tester.onrender.com/api/estado") || code="000"
            echo "intento $i -> HTTP $code"
            if [ "$code" = "200" ]; then echo "Max despierto ✅"; exit 0; fi
            sleep 20
          done
          echo "No respondió 200 tras 3 intentos (puede estar arrancando); no falla el job."
